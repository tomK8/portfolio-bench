spring.application.name=portfolio-bench
# Single-user local tool: bind to loopback only, no auth.
server.address=127.0.0.1
server.port=8080
# Local dev tool — pick up template edits without a restart.
spring.thymeleaf.cache=false
# Daemonised: route the startup banner through the logger so it lands in the log file.
spring.main.banner-mode=log
# Use virtual threads for all Spring MVC request handling (Java 21+).
spring.threads.virtual.enabled=true
