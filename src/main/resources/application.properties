spring.application.name=portfolio-bench
# Single-user local tool: bind to loopback only, no auth.
server.address=127.0.0.1
server.port=8080
# Local dev tool — pick up template edits without a restart.
spring.thymeleaf.cache=false
# Daemonised: route the startup banner through the logger so it lands in the log file.
spring.main.banner-mode=log
# Use virtual threads for all Spring MVC request handling (Java 21+).
spring.threads.virtual.enabled=true

# Watchlist alert emails (off by default). To enable Gmail delivery: create a Google
# app password (Account > Security > App passwords), then set enabled=true and fill in
# username/password/from/to. Keep the app running during market hours (lid open + caffeinate)
# for alerts to fire. Prefer overriding these in a local, untracked properties file rather
# than committing your app password here.
portfolio.alert.mail.enabled=false
portfolio.alert.mail.host=smtp.gmail.com
portfolio.alert.mail.port=587
portfolio.alert.mail.starttls=true
portfolio.alert.mail.username=
portfolio.alert.mail.password=
portfolio.alert.mail.from=
portfolio.alert.mail.to=
