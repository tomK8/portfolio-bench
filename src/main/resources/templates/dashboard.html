<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${appName}">Pension Aggregator</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { font-family: system-ui, sans-serif; margin: 3rem auto; max-width: 960px; color: #1a1a1a; }
        h1 { margin-bottom: 0.25rem; }
        p.sub { color: #666; margin-top: 0; }
        form.actions { margin-top: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
        label { color: #444; }
        input[type=text] { padding: 0.35rem 0.5rem; }
        button { padding: 0.45rem 0.9rem; cursor: pointer; }
        .htmx-indicator { opacity: 0; transition: opacity 150ms ease-in; color: #666; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .htmx-request.htmx-indicator { opacity: 1; }
        #result { margin-top: 2rem; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #eee; text-align: right; }
        th:first-child, td:first-child, th.txt, td.txt { text-align: left; }
        thead th { border-bottom: 2px solid #ccc; }
        .totals { margin-bottom: 1.5rem; }
        .totals span { display: inline-block; margin-right: 1.5rem; }
        .totals b { font-size: 1.1rem; }
        .muted { color: #999; }
        .note { color: #555; padding: 1rem; border: 1px dashed #bbb; border-radius: 8px; }
    </style>
</head>
<body>
    <h1 th:text="${appName}">Pension Aggregator</h1>
    <p class="sub">Local portfolio dashboard &middot; <a href="/dividends">Record dividends</a></p>

    <form class="actions" hx-target="#result" hx-indicator="#spinner">
        <label>II SIPP cash (GBP):
            <input type="text" name="iiSippCash" value="0"/>
        </label>
        <button type="submit" hx-post="/sync">Sync portfolio</button>
        <button type="submit" hx-post="/export">Export Excel</button>
        <span id="spinner" class="htmx-indicator">Working…</span>
    </form>

    <div id="result"></div>
</body>
</html>
