<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${appName}">Pension Aggregator</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            margin: 3rem auto;
            max-width: 960px;
            color: #1a1a1a;
        }

        h1 {
            margin-bottom: 0.25rem;
        }

        p.sub {
            color: #666;
            margin-top: 0;
        }

        form.actions {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        label {
            color: #444;
        }

        input[type=text] {
            padding: 0.35rem 0.5rem;
        }

        button {
            padding: 0.45rem 0.9rem;
            cursor: pointer;
        }

        .htmx-indicator {
            opacity: 0;
            transition: opacity 150ms ease-in;
            color: #666;
        }

        .htmx-request .htmx-indicator {
            opacity: 1;
        }

        .htmx-request.htmx-indicator {
            opacity: 1;
        }

        .result-panel {
            margin-top: 2rem;
        }

        .result-panel h2 {
            font-size: 1rem;
            color: #555;
            margin: 0 0 0.5rem 0;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .result-panel:has(> div:empty) {
            display: none;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 0.4rem 0.6rem;
            border-bottom: 1px solid #eee;
            text-align: right;
        }

        th:first-child, td:first-child, th.txt, td.txt {
            text-align: left;
        }

        thead th {
            border-bottom: 2px solid #ccc;
        }

        .totals {
            margin-bottom: 1.5rem;
        }

        .totals span {
            display: inline-block;
            margin-right: 1.5rem;
        }

        .totals b {
            font-size: 1.1rem;
        }

        .muted {
            color: #999;
        }

        .completed-at {
            color: #888;
            font-size: 0.8rem;
            margin: 0 0 0.5rem 0;
        }

        .note {
            color: #555;
            padding: 1rem;
            border: 1px dashed #bbb;
            border-radius: 8px;
        }

        th[data-sort] {
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        th[data-sort]:hover {
            background: #f5f5f5;
        }

        th[data-sort]::after {
            content: ' \2195';
            color: #bbb;
            font-size: 0.75em;
        }

        th[data-sort][data-sort-dir="asc"]::after {
            content: ' \25b2';
            color: #333;
            font-size: 0.75em;
        }

        th[data-sort][data-sort-dir="desc"]::after {
            content: ' \25bc';
            color: #333;
            font-size: 0.75em;
        }
    </style>
</head>
<body>
<h1 th:text="${appName}">Pension Aggregator</h1>
<p class="sub">Local portfolio dashboard</p>

<form class="actions" hx-indicator="#spinner">
    <label>II SIPP cash (GBP):
        <input name="iiSippCash" th:value="${iiSippCash}" type="text" value="0"/>
    </label>
    <button hx-post="/sync" hx-target="#portfolio-result" type="submit">Aggregated Portfolio</button>
    <button hx-post="/export" hx-target="#export-result" type="submit">Export Excel</button>
</form>

<form class="actions" hx-indicator="#spinner">
    <button hx-post="/import-cash" hx-target="#import-result" type="submit">Import cash statement</button>
    <span class="muted">reads <code>~/Downloads/cashstatements*.csv</code> (AJBell), <code>~/Downloads/History*.xlsx</code> (RothIRA) and UUID-named <code>~/Downloads/*.csv</code> (II SIPP)</span>
    <span class="htmx-indicator" id="spinner">Working…</span>
</form>

<section class="result-panel">
    <h2>Export Excel</h2>
    <div id="export-result"></div>
</section>

<section class="result-panel">
    <h2>Import cash statement</h2>
    <div id="import-result"></div>
</section>

<section class="result-panel">
    <h2>Aggregated portfolio</h2>
    <div id="portfolio-result"></div>
</section>

<script>
    (function () {
        function parseVal(cell, type) {
            var t = cell.textContent.trim();
            if (type === 'num') {
                if (t === '—' || t === '') return null;
                return parseFloat(t.replace(/[£%\s]/g, '').replace(/,/g, '')) || 0;
            }
            return t.toLowerCase();
        }

        function attachSort(table) {
            var ths = Array.from(table.querySelectorAll('thead th[data-sort]'));
            var sortCol = -1, sortAsc = true;
            ths.forEach(function (th, idx) {
                th.addEventListener('click', function () {
                    var type = th.dataset.sort;
                    sortAsc = sortCol === idx ? !sortAsc : true;
                    sortCol = idx;
                    ths.forEach(function (h) {
                        delete h.dataset.sortDir;
                    });
                    th.dataset.sortDir = sortAsc ? 'asc' : 'desc';
                    var tbody = table.querySelector('tbody');
                    var rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.sort(function (a, b) {
                        var av = parseVal(a.cells[idx], type);
                        var bv = parseVal(b.cells[idx], type);
                        if (av === null && bv === null) return 0;
                        if (av === null) return 1;
                        if (bv === null) return -1;
                        var cmp = type === 'num' ? av - bv : av < bv ? -1 : av > bv ? 1 : 0;
                        return sortAsc ? cmp : -cmp;
                    });
                    rows.forEach(function (r) {
                        tbody.appendChild(r);
                    });
                });
            });
        }

        document.body.addEventListener('htmx:afterSettle', function () {
            var table = document.querySelector('#portfolio-result table');
            if (table && !table.dataset.sortAttached) {
                table.dataset.sortAttached = '1';
                attachSort(table);
            }
        });
    }());
</script>
</body>
</html>
