<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Record dividends</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body { font-family: system-ui, sans-serif; margin: 3rem auto; max-width: 820px; color: #1a1a1a; }
        h1 { margin-bottom: 0.25rem; }
        a.back { color: #36c; text-decoration: none; }
        table { border-collapse: collapse; width: 100%; margin-top: 1.5rem; }
        th, td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #eee; text-align: left; }
        input, select { padding: 0.3rem 0.4rem; box-sizing: border-box; width: 100%; }
        .controls { margin-top: 1rem; display: flex; gap: 0.75rem; }
        button { padding: 0.45rem 0.9rem; cursor: pointer; }
        td.remove { width: 1%; }
        td.remove button { background: none; border: none; color: #c33; cursor: pointer; font-size: 1.1rem; }
        #dividend-result { margin-top: 1.25rem; }
        .ok { color: #2a7; padding: 0.75rem 1rem; border: 1px solid #bde5cd; border-radius: 8px; background: #f3fbf6; }
        .err { color: #c33; padding: 0.75rem 1rem; border: 1px solid #f0c5c5; border-radius: 8px; background: #fdf5f5; }
        .err ul { margin: 0.4rem 0 0; }
    </style>
</head>
<body>
    <h1>Record dividends</h1>
    <a class="back" href="/">&larr; Dashboard</a>

    <form hx-post="/dividends" hx-target="#dividend-result">
        <table>
            <thead>
            <tr>
                <th style="width: 22%">Date</th>
                <th style="width: 18%">Account</th>
                <th style="width: 24%">Symbol</th>
                <th style="width: 16%">Currency</th>
                <th style="width: 18%">Amount</th>
                <th></th>
            </tr>
            </thead>
            <tbody id="dividend-rows">
                <tr th:replace="~{fragments/dividends :: row}"></tr>
            </tbody>
        </table>

        <div class="controls">
            <button type="button"
                    hx-get="/dividends/row"
                    hx-target="#dividend-rows"
                    hx-swap="beforeend">+ Add row</button>
            <button type="submit">Save dividends</button>
        </div>
    </form>

    <div id="dividend-result"></div>
</body>
</html>
