<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<table>
    <tbody>
    <tr th:fragment="row">
        <td><input type="date" name="date" th:value="${today}"/></td>
        <td>
            <select name="account">
                <option value="AJBELL">AJBELL</option>
                <option value="II">II</option>
                <option value="ROTH_IRA">ROTH_IRA</option>
            </select>
        </td>
        <td><input type="text" name="symbol" placeholder="e.g. AAPL"/></td>
        <td>
            <select name="currency">
                <option value="GBP">GBP</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>
        </td>
        <td><input type="text" name="amount" placeholder="0.00"/></td>
        <td class="remove">
            <button type="button" title="Remove row" onclick="this.closest('tr').remove()">&times;</button>
        </td>
    </tr>
    </tbody>
</table>

<div th:fragment="result">
    <div th:if="${result.ok}" class="ok"
         th:text="'Saved ' + ${result.savedCount} + ' dividend(s).'">Saved</div>
    <div th:unless="${result.ok}" class="err">
        <strong>Could not save — fix these and try again:</strong>
        <ul>
            <li th:each="e : ${result.errors}" th:text="${e}">error</li>
        </ul>
    </div>
</div>

</body>
</html>
