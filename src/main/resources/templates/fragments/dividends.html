<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<table>
    <tbody>
    <tr th:fragment="row">
        <td><input name="date" th:value="${today}" type="date"/></td>
        <td>
            <select name="account">
                <option value="AJBELL">AJBELL</option>
                <option value="II">II</option>
                <option value="ROTH_IRA">ROTH_IRA</option>
            </select>
        </td>
        <td><input name="symbol" placeholder="e.g. AAPL" type="text"/></td>
        <td>
            <select name="currency">
                <option value="GBP">GBP</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
            </select>
        </td>
        <td><input name="amount" placeholder="0.00" type="text"/></td>
        <td class="remove">
            <button onclick="this.closest('tr').remove()" title="Remove row" type="button">&times;</button>
        </td>
    </tr>
    </tbody>
</table>

<div th:fragment="result">
    <div class="ok" th:if="${result.ok}"
         th:text="'Saved ' + ${result.savedCount} + ' dividend(s).'">Saved
    </div>
    <div class="err" th:unless="${result.ok}">
        <strong>Could not save — fix these and try again:</strong>
        <ul>
            <li th:each="e : ${result.errors}" th:text="${e}">error</li>
        </ul>
    </div>
</div>

</body>
</html>
