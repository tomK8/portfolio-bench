<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<div class="note" th:fragment="result">
    <span th:if="${#lists.isEmpty(cashImports)}">No cash statement files found in ~/Downloads.</span>
    <div th:each="imp : ${cashImports}">
        <span th:if="${imp.status.name() == 'NO_NEW_DATA'}"
              th:text="'[' + ${imp.source} + '] No new data — file removed.'">
            No new data.
        </span>
        <span th:if="${imp.status.name() == 'IMPORTED'}"
              th:text="'[' + ${imp.source} + '] Imported ' + ${imp.inserted} + ' cash transaction(s); archived to ' + ${imp.detail}">
            Imported.
        </span>
    </div>
</div>

</body>
</html>
