# Internal symbol = Yahoo Finance ticker.
# US listings are omitted: any symbol without an entry maps to itself.
# Non-US listings need an exchange suffix (.L London, .PA Paris, .AS Amsterdam, .DE Frankfurt).
# A value may be comma-separated to fetch several listings for one symbol (e.g. dual share classes).

EQQQ=EQQQ.L
LGEN=LGEN.L
SEMI=SEMI.L
BATS=BATS.L
BNP=BNP.PA
ASML=ASML.AS
GLE=GLE.PA
RHM=RHM.DE

# UK equities (LSE)
AV.=AV.L
BA.=BA.L
BARC=BARC.L
BP.=BP.L
HSBA=HSBA.L
LSEG=LSEG.L
REL=REL.L

# ETFs / ETCs (LSE)
VGOV=VGOV.L
GBS=GBS.L
PHGP=PHGP.L
SPX5=SPX5.L
SGBX=SGBX.L

# Holding both Alphabet share classes; fetch each listing separately even though
# the holdings are aggregated under one GOOG/GOOGL symbol.
GOOG/GOOGL=GOOG,GOOGL
